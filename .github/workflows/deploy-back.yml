name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Upload jar to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 217.154.181.154
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "target/TFG_DAW-0.0.1-SNAPSHOT.jar"
          target: "/root/back/"
          
      - name: Restart backend
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: 217.154.181.154
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Restarting backend..."
            systemctl restart tfg-backend
            systemctl status tfg-backend --no-pager
